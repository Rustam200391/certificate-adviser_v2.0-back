databaseChangeLog:
  - changeSet:
      id: 001-create-certificates-table
      author: dev
      changes:
        - createTable:
            tableName: certificates
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: patient_last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: doctor_first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: doctor_last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: doctor_specialization
                  type: VARCHAR(150)
              - column:
                  name: cert_image
                  type: BYTEA
